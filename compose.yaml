services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api

    container_name: hrm-frontend

    ports:
      - "80:80"

    depends_on:
      - api

    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: hrm-api

    expose:
      - "3000"

    env_file:
      - ./backend/.env

    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine

    container_name: hrm-postgres

    expose:
      - "5432"

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

volumes:
  postgres_data:
